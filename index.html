<!DOCTYPE html>
<html lang="ro">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DOCX Search Static</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      padding: 20px;
      color: #222;
    }
    .container {
      max-width: 980px;
      margin: 0 auto;
      background: #fff;
      border-radius: 14px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.25);
      padding: 28px;
    }
    h1 { margin: 0 0 8px; text-align: center; }
    .subtitle { margin: 0 0 18px; text-align: center; color: #555; font-size: 14px; }
    .note {
      background: #eef4ff;
      border: 1px solid #d8e6ff;
      border-radius: 10px;
      padding: 10px 12px;
      font-size: 13px;
      margin-bottom: 16px;
    }
    .search-row { display: flex; gap: 10px; margin-bottom: 14px; }
    input[type="text"] {
      flex: 1;
      padding: 12px 14px;
      border: 2px solid #d7d7d7;
      border-radius: 9px;
      font-size: 16px;
    }
    input[type="text"]:focus { outline: none; border-color: #667eea; }
    button {
      border: none;
      background: #667eea;
      color: white;
      border-radius: 9px;
      padding: 12px 20px;
      cursor: pointer;
      font-weight: 600;
    }
    button:hover { background: #5769dc; }
    .stats {
      background: #f5f7ff;
      border-radius: 9px;
      padding: 10px 12px;
      font-size: 13px;
      color: #4a57a1;
      margin-bottom: 16px;
    }
    .file-result {
      border-left: 4px solid #667eea;
      background: #f8f9ff;
      border-radius: 6px;
      padding: 14px;
      margin-bottom: 14px;
    }
    .file-head { font-weight: 700; margin-bottom: 8px; }
    .badge {
      display: inline-block;
      margin-left: 8px;
      background: #667eea;
      color: #fff;
      border-radius: 999px;
      padding: 2px 8px;
      font-size: 12px;
      font-weight: 600;
    }
    .match-item {
      background: #fff;
      border-left: 3px solid #ffc857;
      padding: 8px 10px;
      border-radius: 5px;
      margin-bottom: 8px;
      cursor: pointer;
    }
    .match-item:hover { background: #f2f6ff; }
    .line { color: #5a69c9; font-weight: 700; margin-right: 6px; }
    .highlight { background: #fff3b0; padding: 1px 3px; border-radius: 3px; }
    .empty { text-align: center; color: #888; padding: 24px 10px; }

    .modal {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.55);
      display: none;
      align-items: center;
      justify-content: center;
      padding: 18px;
      z-index: 999;
    }
    .modal.active { display: flex; }
    .modal-card {
      width: min(980px, 100%);
      max-height: 88vh;
      background: #fff;
      border-radius: 12px;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }
    .modal-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 14px 16px;
      border-bottom: 1px solid #ececec;
      background: #fff;
    }
    .modal-title { margin: 0; font-size: 18px; }
    .close {
      background: transparent;
      color: #444;
      font-size: 26px;
      line-height: 1;
      padding: 0 6px;
    }
    .doc {
      white-space: pre-wrap;
      padding: 16px;
      overflow: auto;
      font-family: 'Courier New', monospace;
      font-size: 14px;
      line-height: 1.6;
      background: #f8f8fb;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>📄 DOCX Search (Static)</h1>
    <p class="subtitle">Caută în conținutul extras din DOCX, fără backend.</p>

    <div class="note">
      Căutarea ignoră diacriticele: dacă scrii <b>Romania</b>, găsește și <b>România</b>.
    </div>

    <div class="search-row">
      <input id="q" type="text" placeholder="Ex: Romania" autocomplete="off" />
      <button id="btn">🔍 Caută</button>
    </div>

    <div class="stats" id="stats">Se încarcă documentele...</div>
    <div id="results"></div>
  </div>

  <div class="modal" id="modal">
    <div class="modal-card">
      <div class="modal-header">
        <h2 class="modal-title" id="modalTitle">Document</h2>
        <button class="close" id="close">×</button>
      </div>
      <div class="doc" id="docView"></div>
    </div>
  </div>

  <script>
    const qInput = document.getElementById('q');
    const btn = document.getElementById('btn');
    const stats = document.getElementById('stats');
    const resultsEl = document.getElementById('results');
    const modal = document.getElementById('modal');
    const modalTitle = document.getElementById('modalTitle');
    const docView = document.getElementById('docView');

    let docs = [];

    const normalize = (s) => (s || '').normalize('NFD').replace(/[\u0300-\u036f]/g, '').toLowerCase();
    const esc = (s) => {
      const d = document.createElement('div');
      d.textContent = s;
      return d.innerHTML;
    };

    function highlightDiacritics(text, query) {
      if (!query) return esc(text);
      const nText = normalize(text);
      const nQuery = normalize(query);
      if (!nText.includes(nQuery)) return esc(text);

      const chars = [...text];
      const normalizedChars = chars.map(ch => normalize(ch));
      const map = [];
      let idx = 0;
      for (let i = 0; i < normalizedChars.length; i++) {
        const part = normalizedChars[i];
        for (let k = 0; k < part.length; k++) map[idx++] = i;
      }

      let out = '';
      let cursor = 0;
      let pos = nText.indexOf(nQuery);
      while (pos !== -1) {
        const startChar = map[pos] ?? 0;
        const endNorm = pos + nQuery.length - 1;
        const endChar = (map[endNorm] ?? (chars.length - 1)) + 1;
        out += esc(chars.slice(cursor, startChar).join(''));
        out += '<mark class="highlight">' + esc(chars.slice(startChar, endChar).join('')) + '</mark>';
        cursor = endChar;
        pos = nText.indexOf(nQuery, pos + nQuery.length);
      }
      out += esc(chars.slice(cursor).join(''));
      return out;
    }

    function search(query) {
      const qn = normalize(query.trim());
      if (!qn) {
        resultsEl.innerHTML = '<div class="empty">Introdu un termen de căutare.</div>';
        stats.textContent = `Documente încărcate: ${docs.length}`;
        return;
      }

      const byFile = [];
      let total = 0;

      for (const doc of docs) {
        const lines = (doc.content || '').split('\n');
        const matches = [];
        lines.forEach((line, i) => {
          if (normalize(line).includes(qn)) {
            matches.push({ lineNumber: i + 1, text: line.trim() || '(linie goală)' });
          }
        });
        if (matches.length) {
          total += matches.length;
          byFile.push({ fileName: doc.fileName, matches, content: doc.content || '' });
        }
      }

      if (!byFile.length) {
        resultsEl.innerHTML = `<div class="empty">Nu am găsit rezultate pentru <b>${esc(query)}</b>.</div>`;
        stats.textContent = `0 rezultate în 0 / ${docs.length} fișiere`;
        return;
      }

      stats.textContent = `${total} rezultate în ${byFile.length} / ${docs.length} fișiere`;

      resultsEl.innerHTML = byFile.map(file => {
        const m = file.matches.map(item => `
          <div class="match-item" data-file="${esc(file.fileName)}" data-q="${esc(query)}">
            <span class="line">Linia ${item.lineNumber}:</span>
            <span>${highlightDiacritics(item.text, query)}</span>
          </div>
        `).join('');

        return `
          <div class="file-result">
            <div class="file-head">📁 ${esc(file.fileName)} <span class="badge">${file.matches.length}</span></div>
            ${m}
          </div>
        `;
      }).join('');

      document.querySelectorAll('.match-item').forEach(node => {
        node.addEventListener('click', () => {
          const fileName = node.getAttribute('data-file');
          const queryText = node.getAttribute('data-q') || '';
          const doc = docs.find(d => d.fileName === fileName);
          if (!doc) return;
          modalTitle.textContent = '📄 ' + fileName;
          docView.innerHTML = highlightDiacritics(doc.content || '', queryText);
          modal.classList.add('active');
        });
      });
    }

    async function boot() {
      try {
        const res = await fetch('./documents.json', { cache: 'no-store' });
        const data = await res.json();
        docs = Array.isArray(data.documents) ? data.documents : [];
        stats.textContent = `Documente încărcate: ${docs.length}`;
        resultsEl.innerHTML = '<div class="empty">Introdu un termen și apasă Caută.</div>';
      } catch (e) {
        stats.textContent = 'Eroare la încărcarea documentelor.';
        resultsEl.innerHTML = '<div class="empty">Verifică dacă există fișierul documents.json.</div>';
      }
    }

    btn.addEventListener('click', () => search(qInput.value));
    qInput.addEventListener('keydown', (e) => { if (e.key === 'Enter') search(qInput.value); });
    document.getElementById('close').addEventListener('click', () => modal.classList.remove('active'));
    modal.addEventListener('click', (e) => { if (e.target === modal) modal.classList.remove('active'); });
    window.addEventListener('keydown', (e) => { if (e.key === 'Escape') modal.classList.remove('active'); });

    boot();
  </script>
</body>
</html>
